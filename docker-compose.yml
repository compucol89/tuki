name: tuki

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8801:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APP_NAME=TukiPass
      - APP_ENV=local
      - APP_KEY=base64:E5LbTZ4Vg7ln6/3iurb51aGec4B9SD7bcicub4uHS+w=
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=eventos
      - DB_USERNAME=root
      - DB_PASSWORD=tukipass
    volumes:
      - .:/app
      - /app/vendor
      - /app/node_modules
    restart: unless-stopped

  db:
    image: mysql:8.0
    ports:
      - "3311:3306"
    environment:
      MYSQL_ROOT_PASSWORD: tukipass
      MYSQL_DATABASE: eventos
    volumes:
      - mysql_data:/var/lib/mysql
      - ./tukipass.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  adminer:
    image: adminer:standalone
    ports:
      - "8889:8080"
    depends_on:
      - db
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8890:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: tukipass
    depends_on:
      - db
    restart: unless-stopped

volumes:
  mysql_data:
